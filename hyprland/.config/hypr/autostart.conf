# Symlink Hyprland socket for Waybar compatibility (Waybar 0.9.x looks in /tmp/hypr)
exec-once = ln -sfn /run/user/1000/hypr /tmp/hypr

# Status bar
exec-once = waybar

# Notifications
exec-once = dunst

# Network manager applet
exec-once = nm-applet --indicator

# Idle management and screen lock
exec-once = swayidle -w timeout 300 'swaylock -f -c 888888' timeout 600 'hyprctl dispatch dpms off' resume 'hyprctl dispatch dpms on' before-sleep 'swaylock -f -c 888888'

# Clipboard history
exec-once = wl-paste --watch cliphist store

# XDG Desktop Portal (screen sharing, file dialogs)
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
