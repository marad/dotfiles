$mainMod = SUPER

# --- Launch ---
bind = $mainMod, Return, exec, alacritty
bind = $mainMod, Q, killactive,
bind = $mainMod, D, exec, fuzzel
bind = $mainMod, O, exec, select-app

# --- Screen lock ---
bind = $mainMod CTRL, L, exec, swaylock -f -c 888888

# --- Focus (vi-style) ---
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r
bind = $mainMod, Left, movefocus, l
bind = $mainMod, Down, movefocus, d
bind = $mainMod, Up, movefocus, u
bind = $mainMod, Right, movefocus, r

# --- Move windows (vi-style) ---
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r

bind = $mainMod SHIFT, Left, movewindow, l
bind = $mainMod SHIFT, Down, movewindow, d
bind = $mainMod SHIFT, Up, movewindow, u
bind = $mainMod SHIFT, Right, movewindow, r

# --- Layout ---
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, Space, togglefloating,
bind = $mainMod, Space, cyclenext,
bind = $mainMod, G, togglesplit,
bind = $mainMod, V, togglesplit,
bind = $mainMod, S, pseudo,
bind = $mainMod, W, togglegroup,
bind = $mainMod, E, togglesplit,

# --- Workspaces ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# --- Move to workspace ---
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# --- Move workspace to output ---
bind = $mainMod CTRL SHIFT, H, movecurrentworkspacetomonitor, l
bind = $mainMod CTRL SHIFT, L, movecurrentworkspacetomonitor, r
bind = $mainMod SHIFT, Tab, movecurrentworkspacetomonitor, +1

# --- Config management ---
bind = $mainMod SHIFT, C, exec, hyprctl reload
bind = $mainMod SHIFT, E, exit,

# --- Resize mode ---
bind = $mainMod, R, submap, resize
submap = resize
binde = , H, resizeactive, -40 0
binde = , J, resizeactive, 0 40
binde = , K, resizeactive, 0 -40
binde = , L, resizeactive, 40 0
binde = , Left, resizeactive, -40 0
binde = , Down, resizeactive, 0 40
binde = , Up, resizeactive, 0 -40
binde = , Right, resizeactive, 40 0
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# --- Move workspace mode ---
bind = $mainMod, M, submap, moveworkspace
submap = moveworkspace
bind = , H, movecurrentworkspacetomonitor, l
bind = , L, movecurrentworkspacetomonitor, r
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = , Escape, submap, reset
bind = , Return, submap, reset
bind = $mainMod, M, submap, reset
submap = reset

# --- Volume ---
binde = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +10%
binde = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -10%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

# --- Screenshots ---
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim - | wl-copy
bind = $mainMod, Print, exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

# --- Voice dictation (hold Pause to record, release to transcribe) ---
bind = , Pause, exec, cd ~/dev/soupawhisper && ~/.local/bin/poetry run python dictate.py toggle
bindr = , Pause, exec, cd ~/dev/soupawhisper && ~/.local/bin/poetry run python dictate.py toggle

# --- Mouse ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
