# Hyprland configuration
# See https://wiki.hyprland.org for reference

# --- Source modular configs ---
source = ~/.config/hypr/env.conf
source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/rules.conf

# --- General ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(f3f4f5ee)
    col.inactive_border = rgba(2f343faa)
    layout = dwindle
}

# --- Input ---
input {
    kb_layout = us
    follow_mouse = 0

    touchpad {
        natural_scroll = true
    }
}

# --- Decoration ---
decoration {
    rounding = 5

    blur {
        enabled = true
        size = 3
        passes = 1
    }

    shadow {
        enabled = true
    }
}

# --- Animations ---
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# --- Layout ---
dwindle {
    pseudotile = true
    preserve_split = true
}

# --- Misc ---
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# --- Machine-specific config (monitors, etc.) ---
# Create ~/.config/hypr/local.conf for machine-specific settings, e.g.:
#   monitor = DP-1, 2560x1440@144, 0x0, 1
#   monitor = HDMI-A-1, 1920x1080@60, 2560x0, 1
source = ~/.config/hypr/local.conf
