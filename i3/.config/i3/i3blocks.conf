# i3blocks config file
#
# Please see man i3blocks for a complete reference!
# The man page is also hosted at http://vivien.github.io/i3blocks
#
# List of valid properties:
#
# align
# color
# command
# full_text
# instance
# interval
# label
# min_width
# name
# separator
# separator_block_width
# short_text
# signal
# urgent

# Global properties
command=/usr/share/i3blocks/$BLOCK_NAME
separator_block_width=15
markup=none

[script]
command=~/.config/i3/blocks/weather
interval=600

# Volume indicator
[volume]
label=♪
instance=Master
interval=once
signal=10

# Memory usage
[memory]
label=MEM
separator=false
interval=30

# Disk usage
[disk]
label=
interval=30

[script]
command=~/.config/i3/blocks/network
interval=10

[script]
command=~/.config/i3/blocks/bandwidth -i "  " -o "  "
interval=1

[script]
command=~/.config/i3/blocks/time
interval=1

[script]
command=~/.config/i3/blocks/battery
interval=30
