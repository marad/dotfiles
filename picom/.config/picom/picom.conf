# --- Backend ---
backend = "glx";
vsync = true;

# --- Shadows (used as window border effect) ---
shadow = true;
shadow-radius = 12;
shadow-opacity = 1.0;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-red = 0.322;
shadow-green = 0.580;
shadow-blue = 0.886;

shadow-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'i3bar'",
    "!focused"
];

# --- Fading ---
fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;

# --- Dim inactive windows ---
inactive-dim = 0.1;

# --- General ---
detect-client-opacity = true;
detect-transient = true;
use-damage = false;
