- name: macOS Configuration
  hosts: localhost
  tasks:
    - name: Install Homebrew packages
      community.general.homebrew:
        name:
          - stow
          - neovim
          - neovide
          - tmux
          - fzf
          - fd
          - eza
          - ripgrep
          - bat
          - jq
          - tree
          - watch
          - parallel
          - starship
          - tree-sitter
          - gh
          - go
          - rustup
          - node
          - ical-buddy
          - podman-compose
          - zoxide
        state: present

    - name: Install Homebrew cask packages
      community.general.homebrew_cask:
        name:
          - font-jetbrains-mono-nerd-font
          - ghostty
          - karabiner-elements
          - podman-desktop
          - gcloud-cli
        state: present

    - name: Setup rustlang with rustup
      ansible.builtin.shell:
        cmd: rustup install stable
      register: rustup_result
      changed_when: "'installed' in rustup_result.stdout"

    - name: Install vinote
      ansible.builtin.shell:
        cmd: . "$HOME/.cargo/env" && cargo install vinote
        creates: ~/.cargo/bin/vinote
